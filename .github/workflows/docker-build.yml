name: Build & Push Docker Image

# 触发规则：
# - push 到 master：构建并推送 latest / master / sha-<short>
# - tag v*.*.*：构建并推送语义版本（v0.4.0 / 0.4 / latest）
# - PR：仅构建验证，不推送
# paths-ignore 过滤纯文档/编辑器/元数据变更，避免无关改动触发重建
on:
  push:
    branches: [master]
    tags: ["v*.*.*"]
    paths-ignore:
      - "docs/**"
      - "**.md"
      - "LICENSE"
      - ".idea/**"
      - ".vscode/**"
      - ".gitignore"
      - ".dockerignore"
  pull_request:
    branches: [master]
    paths-ignore:
      - "docs/**"
      - "**.md"
      - "LICENSE"
      - ".idea/**"
      - ".vscode/**"
      - ".gitignore"
      - ".dockerignore"
  workflow_dispatch: {}

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

concurrency:
  group: docker-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,format=short
            type=raw,value=latest,enable=${{ github.ref == format('refs/heads/{0}', 'master') }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Registry cache：cache layer 存到 GHCR 独立 tag（buildcache），不受 GHA 10GB 限额约束
          # mode=max 缓存所有中间层，torch 装包层（~5GB）跨 run 复用，增量 build <2min
          # PR 不推送普通 image，也不写 cache，只 read（避免污染 cache tag）
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:buildcache
          cache-to: ${{ github.event_name != 'pull_request' && format('type=registry,ref={0}/{1}:buildcache,mode=max', env.REGISTRY, env.IMAGE_NAME) || '' }}
          provenance: false
