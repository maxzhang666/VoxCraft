name: Build & Push Docker Image

# 触发规则：
# - push 到 master：构建并推送 latest / master / sha-<short>
# - tag v*.*.*：构建并推送语义版本（v0.4.0 / 0.4 / latest）
# - PR：仅构建验证，不推送
# paths-ignore 过滤纯文档/编辑器/元数据变更，避免无关改动触发重建
on:
  push:
    branches: [master]
    tags: ["v*.*.*"]
    paths-ignore:
      - "docs/**"
      - "**.md"
      - "LICENSE"
      - ".idea/**"
      - ".vscode/**"
      - ".gitignore"
      - ".dockerignore"
  pull_request:
    branches: [master]
    paths-ignore:
      - "docs/**"
      - "**.md"
      - "LICENSE"
      - ".idea/**"
      - ".vscode/**"
      - ".gitignore"
      - ".dockerignore"
  workflow_dispatch: {}

env:
  REGISTRY: ghcr.io
  # GHCR / Docker 要求 image reference 全小写；github.repository 可能含大写（如 maxzhang666/VoxCraft）
  # 在 job step 动态转成小写写入 env.IMAGE_NAME，后续所有 step 复用

concurrency:
  group: docker-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Normalize image name to lowercase
        run: echo "IMAGE_NAME=${GITHUB_REPOSITORY,,}" >> "$GITHUB_ENV"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,format=short
            type=raw,value=latest,enable=${{ github.ref == format('refs/heads/{0}', 'master') }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=docker
          cache-to: ${{ github.event_name != 'pull_request' && 'type=gha,scope=docker,mode=max' || '' }}
          provenance: false
          # 三层 reproducible builds 措施（缺一不可，之前只做了 1+2 没做 3，
          # 导致 layer blob digest 跨 build 持续漂移，client 每次重下 3+GB）：
          #
          # 1. SOURCE_DATE_EPOCH=1（build-arg）：build 内部工具（uv/pip）尊重
          #    固定时间戳代替 build wallclock，消除 wheel install metadata 漂移
          # 2. Dockerfile `find ... touch -h -d @0`：把 .venv / /opt/GPT-SoVITS
          #    实际文件 mtime 归一到 epoch
          # 3. **rewrite-timestamp=true（outputs）**：BuildKit 在打包 layer tar
          #    时把所有文件 mtime 重写为 SOURCE_DATE_EPOCH。这一步关键——
          #    没有它，BuildKit 用 build 时刻打 tar，即便文件 mtime 已统一也
          #    白搭。这是 BuildKit ≥0.13 的标准 knob。
          #
          # outputs 替代 `push:` 字段；rewrite-timestamp 必须通过 outputs 触发
          build-args: |
            SOURCE_DATE_EPOCH=1
          outputs: |
            type=image,push=${{ github.event_name != 'pull_request' }},rewrite-timestamp=true
