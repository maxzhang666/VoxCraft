name: Build & Push Docker Image

# 两层镜像：
# - voxcraft-base：含 .venv + GPT-SoVITS（~3.5GB），仅 deps 改动时重建
# - voxcraft：FROM voxcraft-base + src + 前端（~50MB 增量），src 改动时重建
#
# detect job 用 paths-filter 决定 base 是否要重建；build-app 永远跑，按
# build-base 状态选基底（重建则用 :sha，跳过则用 :latest）。

on:
  push:
    branches: [master]
    tags: ["v*.*.*"]
    paths-ignore:
      - "docs/**"
      - "**.md"
      - "LICENSE"
      - ".idea/**"
      - ".vscode/**"
      - ".gitignore"
      - ".dockerignore"
  pull_request:
    branches: [master]
    paths-ignore:
      - "docs/**"
      - "**.md"
      - "LICENSE"
      - ".idea/**"
      - ".vscode/**"
      - ".gitignore"
      - ".dockerignore"
  workflow_dispatch:
    inputs:
      force_base:
        description: "强制重建 base 镜像（即使依赖未变）"
        required: false
        default: "false"

env:
  REGISTRY: ghcr.io

concurrency:
  group: docker-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  detect:
    runs-on: ubuntu-latest
    outputs:
      base_changed: ${{ steps.filter.outputs.base }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            base:
              - 'pyproject.toml'
              - 'uv.lock'
              - 'Dockerfile.base'
              - '.github/workflows/docker-build.yml'

  build-base:
    needs: detect
    if: |
      needs.detect.outputs.base_changed == 'true'
      || github.event.inputs.force_base == 'true'
      || startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Normalize image name to lowercase
        run: echo "IMAGE_NAME=${GITHUB_REPOSITORY,,}" >> "$GITHUB_ENV"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push base
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.base
          platforms: linux/amd64
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-base:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-base:${{ github.sha }}
          cache-from: type=gha,scope=docker-base
          cache-to: ${{ github.event_name != 'pull_request' && 'type=gha,scope=docker-base,mode=max' || '' }}
          provenance: false
          build-args: |
            SOURCE_DATE_EPOCH=1
          # rewrite-timestamp=true 让 BuildKit 把所有 layer entry mtime 重写为
          # SOURCE_DATE_EPOCH，base layer blob 跨构建字节稳定，client cache 命中
          outputs: |
            type=image,push=${{ github.event_name != 'pull_request' }},rewrite-timestamp=true

  build-app:
    needs: [detect, build-base]
    # build-base 跳过（deps 未变）或成功（deps 变了）都要继续；只有 base 失败才中断
    if: |
      always()
      && (needs.build-base.result == 'success' || needs.build-base.result == 'skipped')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Normalize image name to lowercase
        run: echo "IMAGE_NAME=${GITHUB_REPOSITORY,,}" >> "$GITHUB_ENV"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,format=short
            type=raw,value=latest,enable=${{ github.ref == format('refs/heads/{0}', 'master') }}

      - name: Resolve base image tag
        id: base
        run: |
          if [ "${{ needs.build-base.result }}" = "success" ]; then
            # 这次 push 重建了 base：用 sha tag 确保 app 跟它一一对应
            echo "tag=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-base:${{ github.sha }}" >> "$GITHUB_OUTPUT"
          else
            # base 未重建：复用最新已发布 base
            echo "tag=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-base:latest" >> "$GITHUB_OUTPUT"
          fi

      - name: Build and push app
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=docker-app
          cache-to: ${{ github.event_name != 'pull_request' && 'type=gha,scope=docker-app,mode=max' || '' }}
          provenance: false
          build-args: |
            SOURCE_DATE_EPOCH=1
            BASE_IMAGE=${{ steps.base.outputs.tag }}
          outputs: |
            type=image,push=${{ github.event_name != 'pull_request' }},rewrite-timestamp=true
