name: Build & Push Docker Image

# 触发规则：
# - push 到 master：构建并推送 latest / master / sha-<short>
# - tag v*.*.*：构建并推送语义版本（v0.4.0 / 0.4 / latest）
# - PR：仅构建验证，不推送
# paths-ignore 过滤纯文档/编辑器/元数据变更，避免无关改动触发重建
on:
  push:
    branches: [master]
    tags: ["v*.*.*"]
    paths-ignore:
      - "docs/**"
      - "**.md"
      - "LICENSE"
      - ".idea/**"
      - ".vscode/**"
      - ".gitignore"
      - ".dockerignore"
  pull_request:
    branches: [master]
    paths-ignore:
      - "docs/**"
      - "**.md"
      - "LICENSE"
      - ".idea/**"
      - ".vscode/**"
      - ".gitignore"
      - ".dockerignore"
  workflow_dispatch: {}

env:
  REGISTRY: ghcr.io
  # GHCR / Docker 要求 image reference 全小写；github.repository 可能含大写（如 maxzhang666/VoxCraft）
  # 在 job step 动态转成小写写入 env.IMAGE_NAME，后续所有 step 复用

concurrency:
  group: docker-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Normalize image name to lowercase
        run: echo "IMAGE_NAME=${GITHUB_REPOSITORY,,}" >> "$GITHUB_ENV"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,format=short
            type=raw,value=latest,enable=${{ github.ref == format('refs/heads/{0}', 'master') }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # 双轨 cache：GHCR registry 给跨 PR/分支共享，GHA 给同分支内热路径
          # - registry mode=max：缓存所有中间层（torch wheel 等 ~5GB），跨 run 复用
          # - GHA cache：~10GB 限额内但命中速度快、稳定性高于 GHCR registry
          # - PR 不推送 image 也不写 cache（避免污染共享 cache tag）
          cache-from: |
            type=gha,scope=docker
            type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:buildcache
          cache-to: |
            ${{ github.event_name != 'pull_request' && 'type=gha,scope=docker,mode=max' || '' }}
            ${{ github.event_name != 'pull_request' && format('type=registry,ref={0}/{1}:buildcache,mode=max', env.REGISTRY, env.IMAGE_NAME) || '' }}
          provenance: false
          # SOURCE_DATE_EPOCH=1：build 内部工具（uv/pip 等）尊重固定时间戳代替 build
          # 时刻，消除 wheel install 写 metadata 时的 mtime 漂移。Dockerfile 内
          # `find ... touch -h -d @0` 已显式归一 .venv / /opt/GPT-SoVITS，这里是
          # 双重保险（覆盖工具自身写的 timestamp，find 兜底实际文件 mtime）。
          # 用 1 而非 0：某些 BuildKit 版本把 0 当作"未设置"。
          build-args: |
            SOURCE_DATE_EPOCH=1
