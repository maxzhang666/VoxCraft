name: Build & Push Docker Image

# 触发规则：
# - push 到 master：构建并推送 latest / master / sha-<short>
# - tag v*.*.*：构建并推送语义版本
# - PR：仅构建验证，不推送
# 单 image 架构（之前尝试过 base+app 拆分，CI 时间从 3min 涨到 15min，回滚）。
# 关键是 reproducibility 三层措施：
# 1. SOURCE_DATE_EPOCH=1 build-arg：build 内部工具（uv/pip）尊重固定时间戳
# 2. Dockerfile `find ... touch -h -d @0`：归一文件 mtime
# 3. outputs rewrite-timestamp=true：BuildKit 在打包 layer tar 时把所有
#    entry mtime 重写为 SOURCE_DATE_EPOCH。这一步关键——没有它，BuildKit 用
#    build wallclock 写 tar，文件 mtime 已统一也白搭。
# 三层叠加后 layer blob 跨 build 字节稳定，CI cache 与 client docker pull
# 都能精准命中。

on:
  push:
    branches: [master]
    tags: ["v*.*.*"]
    paths-ignore:
      - "docs/**"
      - "**.md"
      - "LICENSE"
      - ".idea/**"
      - ".vscode/**"
      - ".gitignore"
      - ".dockerignore"
  pull_request:
    branches: [master]
    paths-ignore:
      - "docs/**"
      - "**.md"
      - "LICENSE"
      - ".idea/**"
      - ".vscode/**"
      - ".gitignore"
      - ".dockerignore"
  workflow_dispatch: {}

env:
  REGISTRY: ghcr.io

concurrency:
  group: docker-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Normalize image name to lowercase
        run: echo "IMAGE_NAME=${GITHUB_REPOSITORY,,}" >> "$GITHUB_ENV"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,format=short
            type=raw,value=latest,enable=${{ github.ref == format('refs/heads/{0}', 'master') }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=docker
          cache-to: ${{ github.event_name != 'pull_request' && 'type=gha,scope=docker,mode=max' || '' }}
          provenance: false
          build-args: |
            SOURCE_DATE_EPOCH=1
          # outputs 替代 push: 字段；rewrite-timestamp=true 让 BuildKit 把所有
          # layer 文件 mtime 重写为 SOURCE_DATE_EPOCH，是 reproducibility 的关键。
          outputs: |
            type=image,push=${{ github.event_name != 'pull_request' }},rewrite-timestamp=true
