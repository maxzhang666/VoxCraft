[project]
name = "voxcraft"
version = "0.1.0"
description = "自托管多模态音频推理服务 (ASR / TTS / 克隆 / 人声分离)"
# 3.11 是 IndexTTS 依赖矩阵的甜蜜点：IndexTTS pin 死的几个版本（numba==0.58.1 /
# llvmlite==0.41.1 / numpy==1.26.2 / transformers==4.52.1）在 PyPI 都有 cp311 预编 wheel；
# cp312 起 numba 0.58.1 / llvmlite 0.41.1 没有 wheel（numba 0.59 / llvmlite 0.42 起才支持），
# sdist 编译需要 LLVM 14 + 不被 0.58.1 正式支持的 cp312 PyAPI，极易失败。
requires-python = ">=3.11,<3.12"
readme = "README.md"
license = { text = "MIT" }

dependencies = [
    "fastapi>=0.115",
    "uvicorn[standard]>=0.32",
    "pydantic>=2.9",
    "pydantic-settings>=2.6",
    "sqlmodel>=0.0.22",
    "alembic>=1.14",
    "structlog>=24.4",
    "httpx>=0.28",
    "sse-starlette>=2.1",
    "python-multipart>=0.0.12",
    "python-dotenv>=1.0",
    "faster-whisper>=1.0",
    "piper-tts>=1.4.2",
    # modelscope：项目仅用 snapshot_download(model_id, local_dir, max_workers)
    # IndexTTS 钉死 modelscope==1.27.0；放宽兼容
    "modelscope>=1.27,<2",
    "openai>=1.50",
    "ffmpeg-python>=0.2.0",
    "zhconv>=1.4.3",
    # GPU 支持：
    # - torch：VoxCPM / IndexTTS / Demucs 系 provider 需要；/health 探测优先用它
    # - nvidia-ml-py：torch 未加载场景（CPU 部署、mac 开发）下对 GPU 的轻量探测兜底
    # torch 2.8 默认 PyPI wheel Linux 自带 CUDA 12.x runtime；mac arm64 自带 CPU/MPS wheel。
    # 升级到 2.8 是 IndexTTS-2 的硬约束（pin torch==2.8.*）；voxcpm>=2.0 / faster-whisper /
    # piper-tts 三个均无 torch 上界，统一在 2.8 兼容。
    "torch>=2.8,<2.9",
    # torchaudio 必须跟 torch 同 minor 版本（PyTorch 团队同步发布；ABI 强绑定）。
    "torchaudio>=2.8,<2.9",
    "nvidia-ml-py>=12",
    # 声纹克隆 Provider：默认随项目装；用户在「模型库」下载对应模型后即可用
    # - voxcpm：Apache 2.0；CPU-first 加载，需要 ≥ 2× 模型字节的 RAM
    # - indextts：B 站，无 PyPI 包，从 git tag 安装；含完整 build-system，uv 可解析为正常依赖
    #   注：IndexTTS pin 了 numpy==1.26.2 / transformers==4.52.1 / accelerate==1.8.1 等，
    #   uv lock 时会拉到这些精确版本——voxcpm 仅声明 transformers>=4.36 不冲突
    "voxcpm>=2.0",
    "indextts",
]

[tool.uv.sources]
# IndexTTS 官方仅支持 git 安装（不发 PyPI）；v2 当前未打 release tag，
# 钉 main HEAD commit hash 避免 main 漂移；后续官方打 tag 时切到 tag
indextts = { git = "https://github.com/index-tts/index-tts.git", rev = "830f6f8f94a51fea23ab1d639027a86200075a4e" }

[project.optional-dependencies]
dev = [
    "pytest>=8.3",
    "pytest-asyncio>=0.24",
    "pytest-cov>=6.0",
    "httpx>=0.28",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/voxcraft"]

[tool.pytest.ini_options]
testpaths = ["tests"]
markers = ["slow: marks tests that load real models (deselect with -m 'not slow')"]
asyncio_mode = "auto"

[tool.coverage.run]
source = ["src/voxcraft"]
branch = true
omit = [
    "*/providers/mock.py",       # 仅测试用 Mock 实现
    "*/db/migrate.py",           # Alembic 驱动脚手架
    "*/__main__.py",
]

[tool.coverage.report]
precision = 1
show_missing = false
skip_covered = false
exclude_lines = [
    "pragma: no cover",
    "raise NotImplementedError",
    "if __name__ == .__main__.:",
    "\\.\\.\\.",  # Protocol / abstract stub
]
