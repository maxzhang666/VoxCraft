[project]
name = "voxcraft"
version = "0.1.0"
description = "自托管多模态音频推理服务 (ASR / TTS / 克隆 / 人声分离)"
requires-python = ">=3.13"
readme = "README.md"
license = { text = "MIT" }

dependencies = [
    "fastapi>=0.115",
    "uvicorn[standard]>=0.32",
    "pydantic>=2.9",
    "pydantic-settings>=2.6",
    "sqlmodel>=0.0.22",
    "alembic>=1.14",
    "structlog>=24.4",
    "httpx>=0.28",
    "sse-starlette>=2.1",
    "python-multipart>=0.0.12",
    "python-dotenv>=1.0",
    "faster-whisper>=1.0",
    "piper-tts>=1.4.2",
    "modelscope>=1.36.1",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.3",
    "pytest-asyncio>=0.24",
    "httpx>=0.28",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/voxcraft"]

[tool.pytest.ini_options]
testpaths = ["tests"]
markers = ["slow: marks tests that load real models (deselect with -m 'not slow')"]
asyncio_mode = "auto"
